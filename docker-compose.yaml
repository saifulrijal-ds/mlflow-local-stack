volumes:
  pgdata:
  rustfs-data:

services:
  # ── Backend Store ──────────────────────────────────────────────
  postgres:
    image: postgres:17
    container_name: mlflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Artifact Store (S3-compatible) ─────────────────────────────
  rustfs:
    image: rustfs/rustfs:${RUSTFS_VERSION:-1.0.0-beta.4}
    container_name: mlflow-rustfs
    restart: unless-stopped
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY}
    volumes:
      - rustfs-data:/data
    ports:
      - "${RUSTFS_API_PORT:-9090}:9000"
      - "${RUSTFS_CONSOLE_PORT:-9091}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 5s
      timeout: 3s
      retries: 20

  # ── Init: Create S3 Bucket (using boto3) ───────────────────────
  create-bucket:
    build:
      context: .
      args:
        MLFLOW_VERSION: ${MLFLOW_VERSION:-latest}
    container_name: mlflow-create-bucket
    depends_on:
      rustfs:
        condition: service_healthy
    environment:
      RUSTFS_ENDPOINT: http://rustfs:9000
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY}
      RUSTFS_BUCKET: ${RUSTFS_BUCKET:-mlflow}
    command: python /app/create_bucket.py
    volumes:
      - ./scripts:/app:ro
    restart: "no"

  # ── MLflow Tracking Server ─────────────────────────────────────
  # Note: mlflow server auto-initialises and upgrades the DB schema on startup.
  # A separate `mlflow db upgrade` step is not needed (and is broken in MLflow 3.x).
  mlflow:
    build:
      context: .
      args:
        MLFLOW_VERSION: ${MLFLOW_VERSION:-latest}
    container_name: mlflow-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rustfs:
        condition: service_healthy
      create-bucket:
        condition: service_completed_successfully
    environment:
      MLFLOW_BACKEND_STORE_URI: ${MLFLOW_BACKEND_STORE_URI}
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
      AWS_ACCESS_KEY_ID: ${RUSTFS_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${RUSTFS_SECRET_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      MLFLOW_S3_IGNORE_TLS: "true"
    command: >
      mlflow server
        --backend-store-uri "${MLFLOW_BACKEND_STORE_URI}"
        --artifacts-destination "${MLFLOW_ARTIFACTS_DESTINATION}"
        --serve-artifacts
        --host "${MLFLOW_HOST:-0.0.0.0}"
        --port "${MLFLOW_PORT:-5000}"
    ports:
      - "${MLFLOW_PORT:-5000}:${MLFLOW_PORT:-5000}"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:${MLFLOW_PORT:-5000}/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 30

networks:
  default:
    name: mlflow-network
